rootProject.name = 'AvtojonMobile'

def nativeModulesGradle = file("../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
if (!nativeModulesGradle.exists()) {
    nativeModulesGradle = file("../../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
}
apply from: nativeModulesGradle; applyNativeModulesSettingsGradle(settings)

include ':app'

def gradlePluginPath = file("../node_modules/@react-native/gradle-plugin")
if (!gradlePluginPath.exists()) {
    gradlePluginPath = file("../../../node_modules/@react-native/gradle-plugin")
}
includeBuild(gradlePluginPath)
